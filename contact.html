<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg bg-dark ">
        <div class="container ">
            <a class="navbar-brand text-white" href="#">Serao.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse " id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 ">
                    <li class="nav-item">
                        <a class="nav-link active text-white" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" aria-current="page" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" aria-current="page" href="service.html">Service</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" aria-current="page" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Body Start -->

    <section class="about-title">
        <h1>Contact</h1>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. </p>
    </section>

    <!-- Contact Section -->

    <section class="contact py-5">

        <div class="container">

            <div class="text-center mb-5">
                <p class="text-uppercase text-secondary fw-bold">
                    Contact
                </p>

                <h2 class="fw-bold display-5">
                    Get In Touch
                </h2>
            </div>

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <form class="contact-form p-5">

                        <!-- Name -->
                        <div class="mb-4">
                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text" class="form-control" placeholder="Enter your name">
                        </div>

                        <!-- Email -->
                        <div class="mb-4">
                            <label class="form-label">
                                Email Address
                            </label>

                            <input type="email" class="form-control" placeholder="Enter your email">
                        </div>

                        <!-- Subject -->
                        <div class="mb-4">
                            <label class="form-label">
                                Subject
                            </label>

                            <input type="text" class="form-control" placeholder="Enter subject">
                        </div>

                        <!-- Message -->
                        <div class="mb-4">
                            <label class="form-label">
                                Message
                            </label>

                            <textarea class="form-control" rows="6" placeholder="Write your message"></textarea>
                        </div>

                        <!-- Button -->
                        <button type="submit" class="btn btn-dark px-5 py-3">

                            Send Message

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>
    <!-- Body End -->





    <!-- Footer Here -->
    <footer class="text-center text-lg-start" style="background-color: #212529;">
        <div class="container d-flex justify-content-center py-5">
            <button type="button" class="btn btn-primary btn-lg btn-floating mx-2" style="background-color: #212529;">
                <i class="fab fa-facebook-f"></i>
            </button>

            <button type="button" class="btn btn-primary btn-lg btn-floating mx-2" style="background-color: #212529">
                <i class="fab fa-youtube"></i>
            </button>

            <button type="button" class="btn btn-primary btn-lg btn-floating mx-2" style="background-color: #212529">
                <i class="fab fa-instagram"></i>
            </button>

            <button type="button" class="btn btn-primary btn-lg btn-floating mx-2" style="background-color: #212529">
                <i class="fab fa-twitter"></i>
            </button>
        </div>

        <div class="text-center text-white p-3" style="background-color: rgba(0, 0, 0, 0.2);">
            © 2026 Copyright: Turja Sarao
        </div>
    </footer>


    <!-- script File Here -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
